name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  dotnet-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Restore and test
        run: dotnet test LGBApp.Backend.Tests/LGBApp.Backend.Tests.csproj --configuration Release --verbosity normal

  workflow-backtest:
    runs-on: ubuntu-latest
    needs: dotnet-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Start API
        run: |
          dotnet run --project LGBApp.Backend/LGBApp.Backend.csproj --no-launch-profile &
          echo $! > api.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5003/swagger/index.html > /dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          exit 1
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5003
      - name: Run workflow backtest
        run: python3 scripts/workflow_backtest.py
      - name: Stop API
        if: always()
        run: kill $(cat api.pid) 2>/dev/null || true
